<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Markdown Reader</title>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500&family=Literata:opsz,wght@7..72,400;7..72,500;7..72,600&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/marked/12.0.0/marked.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <style>
        *, *::before, *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        :root {
            --ink: #1a1a1a;
            --paper: #f8f6f1;
            --paper-light: #fffef9;
            --accent: #c45d35;
            --accent-hover: #a84d2a;
            --muted: #8a8580;
            --border: #e5e2db;
            --code-bg: #2d2a26;
            --code-text: #e8e6e1;
            --shadow: rgba(26, 26, 26, 0.08);
            --transition: 200ms cubic-bezier(0.4, 0, 0.2, 1);
        }

        html {
            font-size: 16px;
            scroll-behavior: smooth;
        }

        body {
            font-family: 'Literata', Georgia, serif;
            background: var(--paper);
            color: var(--ink);
            min-height: 100vh;
            line-height: 1.7;
        }

        /* Header */
        header {
            padding: 1.5rem 2rem;
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: var(--paper-light);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 0.75rem;
        }

        .logo-icon {
            width: 32px;
            height: 32px;
            background: var(--ink);
            border-radius: 6px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--paper);
            font-family: 'JetBrains Mono', monospace;
            font-weight: 500;
            font-size: 0.9rem;
        }

        .logo-text {
            font-weight: 600;
            font-size: 1.1rem;
            letter-spacing: -0.02em;
        }

        .actions {
            display: flex;
            gap: 0.75rem;
        }

        .btn {
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.8rem;
            padding: 0.6rem 1.2rem;
            border-radius: 6px;
            border: none;
            cursor: pointer;
            transition: all var(--transition);
            display: flex;
            align-items: center;
            gap: 0.5rem;
            font-weight: 500;
        }

        .btn-secondary {
            background: var(--paper);
            color: var(--ink);
            border: 1px solid var(--border);
        }

        .btn-secondary:hover {
            background: var(--ink);
            color: var(--paper);
            border-color: var(--ink);
        }

        .btn-primary {
            background: var(--accent);
            color: white;
        }

        .btn-primary:hover {
            background: var(--accent-hover);
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(196, 93, 53, 0.3);
        }

        .btn-primary:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }

        /* Main Layout */
        main {
            display: grid;
            grid-template-columns: 1fr 1fr;
            min-height: calc(100vh - 65px);
        }

        /* Editor Panel */
        .editor-panel {
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            position: relative;
        }

        .panel-header {
            padding: 1rem 1.5rem;
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: var(--paper-light);
        }

        .panel-title {
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            color: var(--muted);
        }

        .char-count {
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.7rem;
            color: var(--muted);
        }

        .editor-wrapper {
            flex: 1;
            position: relative;
            overflow: hidden;
        }

        #editor {
            width: 100%;
            height: 100%;
            padding: 1.5rem;
            border: none;
            resize: none;
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.9rem;
            line-height: 1.8;
            background: var(--paper-light);
            color: var(--ink);
            outline: none;
        }

        #editor::placeholder {
            color: var(--muted);
        }

        /* Drop Zone */
        .drop-zone {
            position: absolute;
            inset: 0;
            background: rgba(248, 246, 241, 0.97);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            opacity: 0;
            visibility: hidden;
            transition: all var(--transition);
            border: 3px dashed var(--border);
            margin: 1rem;
            border-radius: 12px;
        }

        .drop-zone.active {
            opacity: 1;
            visibility: visible;
            border-color: var(--accent);
            background: rgba(196, 93, 53, 0.05);
        }

        .drop-icon {
            width: 64px;
            height: 64px;
            border-radius: 50%;
            background: var(--accent);
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }

        .drop-text {
            font-size: 1.1rem;
            color: var(--ink);
        }

        .drop-hint {
            font-size: 0.85rem;
            color: var(--muted);
        }

        /* Preview Panel */
        .preview-panel {
            display: flex;
            flex-direction: column;
            background: var(--paper-light);
        }

        .preview-wrapper {
            flex: 1;
            overflow-y: auto;
            padding: 2rem 3rem;
        }

        /* Markdown Styles */
        #preview {
            max-width: 720px;
            margin: 0 auto;
        }

        #preview h1 {
            font-size: 2.2rem;
            font-weight: 600;
            margin-bottom: 1.5rem;
            letter-spacing: -0.02em;
            line-height: 1.2;
            border-bottom: 2px solid var(--border);
            padding-bottom: 0.75rem;
        }

        #preview h2 {
            font-size: 1.6rem;
            font-weight: 600;
            margin-top: 2.5rem;
            margin-bottom: 1rem;
            letter-spacing: -0.01em;
            color: var(--accent);
        }

        #preview h3 {
            font-size: 1.3rem;
            font-weight: 600;
            margin-top: 2rem;
            margin-bottom: 0.75rem;
        }

        #preview h4, #preview h5, #preview h6 {
            font-size: 1.1rem;
            font-weight: 600;
            margin-top: 1.5rem;
            margin-bottom: 0.5rem;
        }

        #preview p {
            margin-bottom: 1.25rem;
        }

        #preview a {
            color: var(--accent);
            text-decoration: underline;
            text-underline-offset: 3px;
            transition: color var(--transition);
        }

        #preview a:hover {
            color: var(--accent-hover);
        }

        #preview strong {
            font-weight: 600;
        }

        #preview em {
            font-style: italic;
        }

        #preview ul, #preview ol {
            margin-bottom: 1.25rem;
            padding-left: 1.5rem;
        }

        #preview li {
            margin-bottom: 0.4rem;
        }

        #preview li::marker {
            color: var(--accent);
        }

        #preview blockquote {
            border-left: 4px solid var(--accent);
            padding-left: 1.5rem;
            margin: 1.5rem 0;
            font-style: italic;
            color: var(--muted);
        }

        #preview code {
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.85em;
            background: var(--code-bg);
            color: var(--code-text);
            padding: 0.2em 0.4em;
            border-radius: 4px;
        }

        #preview pre {
            background: var(--code-bg);
            color: var(--code-text);
            padding: 1.25rem;
            border-radius: 8px;
            overflow-x: auto;
            margin: 1.5rem 0;
        }

        #preview pre code {
            background: none;
            padding: 0;
            font-size: 0.85rem;
            line-height: 1.6;
        }

        #preview hr {
            border: none;
            border-top: 2px solid var(--border);
            margin: 2.5rem 0;
        }

        #preview table {
            width: 100%;
            border-collapse: collapse;
            margin: 1.5rem 0;
            font-size: 0.95rem;
        }

        #preview th, #preview td {
            border: 1px solid var(--border);
            padding: 0.75rem 1rem;
            text-align: left;
        }

        #preview th {
            background: var(--paper);
            font-weight: 600;
        }

        #preview img {
            max-width: 100%;
            height: auto;
            border-radius: 8px;
            margin: 1rem 0;
        }

        /* Empty State */
        .empty-state {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100%;
            color: var(--muted);
            text-align: center;
            padding: 2rem;
        }

        .empty-state-icon {
            font-size: 3rem;
            margin-bottom: 1rem;
            opacity: 0.5;
        }

        .empty-state-text {
            font-size: 1.1rem;
            margin-bottom: 0.5rem;
        }

        .empty-state-hint {
            font-size: 0.9rem;
            opacity: 0.7;
        }

        /* File Input */
        .file-input {
            display: none;
        }

        /* Toast */
        .toast {
            position: fixed;
            bottom: 2rem;
            left: 50%;
            transform: translateX(-50%) translateY(100px);
            background: var(--ink);
            color: var(--paper);
            padding: 1rem 1.5rem;
            border-radius: 8px;
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.85rem;
            opacity: 0;
            transition: all 300ms ease;
            z-index: 1000;
        }

        .toast.show {
            transform: translateX(-50%) translateY(0);
            opacity: 1;
        }

        /* Responsive */
        @media (max-width: 900px) {
            main {
                grid-template-columns: 1fr;
                grid-template-rows: 1fr 1fr;
            }

            .editor-panel {
                border-right: none;
                border-bottom: 1px solid var(--border);
            }

            header {
                flex-wrap: wrap;
                gap: 1rem;
            }

            .actions {
                width: 100%;
                justify-content: flex-end;
            }
        }

        @media (max-width: 600px) {
            header {
                padding: 1rem;
            }

            .preview-wrapper {
                padding: 1.5rem;
            }

            .btn {
                padding: 0.5rem 0.8rem;
                font-size: 0.75rem;
            }

            .btn span:not(.icon) {
                display: none;
            }
        }

        /* PDF Export Styles (hidden, used for rendering) */
        .pdf-export {
            font-family: Georgia, serif;
            padding: 40px;
            max-width: 800px;
            line-height: 1.6;
        }
    </style>
</head>
<body>
    <header>
        <div class="logo">
            <div class="logo-icon">Md</div>
            <span class="logo-text">Markdown Reader</span>
        </div>
        <div class="actions">
            <input type="file" id="fileInput" class="file-input" accept=".md,.markdown,.txt">
            <button class="btn btn-secondary" onclick="document.getElementById('fileInput').click()">
                <span class="icon">📂</span>
                <span>Open File</span>
            </button>
            <button class="btn btn-secondary" onclick="clearEditor()">
                <span class="icon">🗑️</span>
                <span>Clear</span>
            </button>
            <button class="btn btn-primary" id="exportBtn" onclick="exportPDF()" disabled>
                <span class="icon">📄</span>
                <span>Export PDF</span>
            </button>
        </div>
    </header>

    <main>
        <section class="editor-panel">
            <div class="panel-header">
                <span class="panel-title">Editor</span>
                <span class="char-count" id="charCount">0 characters</span>
            </div>
            <div class="editor-wrapper">
                <textarea 
                    id="editor" 
                    placeholder="Type or paste your Markdown here...

Or drag & drop a .md file anywhere on this panel.

Try some Markdown:
# Heading 1
## Heading 2
**bold** and *italic*
- List item
> Blockquote
`inline code`"></textarea>
                <div class="drop-zone" id="dropZone">
                    <div class="drop-icon">📥</div>
                    <div class="drop-text">Drop your Markdown file here</div>
                    <div class="drop-hint">Supports .md, .markdown, and .txt files</div>
                </div>
            </div>
        </section>

        <section class="preview-panel">
            <div class="panel-header">
                <span class="panel-title">Preview</span>
            </div>
            <div class="preview-wrapper">
                <div id="preview">
                    <div class="empty-state">
                        <div class="empty-state-icon">✨</div>
                        <div class="empty-state-text">Your preview will appear here</div>
                        <div class="empty-state-hint">Start typing Markdown in the editor</div>
                    </div>
                </div>
            </div>
        </section>
    </main>

    <div class="toast" id="toast"></div>

    <script>
        // Elements
        const editor = document.getElementById('editor');
        const preview = document.getElementById('preview');
        const dropZone = document.getElementById('dropZone');
        const fileInput = document.getElementById('fileInput');
        const charCount = document.getElementById('charCount');
        const exportBtn = document.getElementById('exportBtn');
        const toast = document.getElementById('toast');

        // Configure marked
        marked.setOptions({
            breaks: true,
            gfm: true
        });

        // Render markdown
        function renderMarkdown() {
            const text = editor.value.trim();
            
            if (text) {
                preview.innerHTML = marked.parse(text);
                exportBtn.disabled = false;
            } else {
                preview.innerHTML = `
                    <div class="empty-state">
                        <div class="empty-state-icon">✨</div>
                        <div class="empty-state-text">Your preview will appear here</div>
                        <div class="empty-state-hint">Start typing Markdown in the editor</div>
                    </div>
                `;
                exportBtn.disabled = true;
            }

            // Update character count
            charCount.textContent = `${text.length.toLocaleString()} characters`;
        }

        // Clear editor
        function clearEditor() {
            editor.value = '';
            renderMarkdown();
            showToast('Editor cleared');
        }

        // Show toast notification
        function showToast(message) {
            toast.textContent = message;
            toast.classList.add('show');
            setTimeout(() => {
                toast.classList.remove('show');
            }, 2500);
        }

        // Handle file reading
        function handleFile(file) {
            const validTypes = ['.md', '.markdown', '.txt'];
            const fileName = file.name.toLowerCase();
            const isValid = validTypes.some(ext => fileName.endsWith(ext));

            if (!isValid) {
                showToast('Please drop a Markdown file (.md, .markdown, .txt)');
                return;
            }

            const reader = new FileReader();
            reader.onload = (e) => {
                editor.value = e.target.result;
                renderMarkdown();
                showToast(`Loaded: ${file.name}`);
            };
            reader.onerror = () => {
                showToast('Error reading file');
            };
            reader.readAsText(file);
        }

        // Export to PDF
        async function exportPDF() {
            const text = editor.value.trim();
            if (!text) return;

            exportBtn.disabled = true;
            exportBtn.innerHTML = '<span class="icon">⏳</span><span>Exporting...</span>';

            try {
                // Create a temporary container for PDF
                const container = document.createElement('div');
                container.className = 'pdf-export';
                container.innerHTML = marked.parse(text);
                
                // Apply print-friendly styles
                container.style.cssText = `
                    font-family: Georgia, serif;
                    padding: 20px;
                    max-width: 100%;
                    line-height: 1.6;
                    color: #1a1a1a;
                `;

                // Style elements for PDF
                container.querySelectorAll('h1').forEach(el => {
                    el.style.cssText = 'font-size: 24pt; margin-bottom: 16px; border-bottom: 2px solid #ddd; padding-bottom: 8px;';
                });
                container.querySelectorAll('h2').forEach(el => {
                    el.style.cssText = 'font-size: 18pt; margin-top: 24px; margin-bottom: 12px; color: #c45d35;';
                });
                container.querySelectorAll('h3').forEach(el => {
                    el.style.cssText = 'font-size: 14pt; margin-top: 20px; margin-bottom: 10px;';
                });
                container.querySelectorAll('code').forEach(el => {
                    el.style.cssText = 'font-family: monospace; background: #f0f0f0; padding: 2px 6px; border-radius: 3px; font-size: 10pt;';
                });
                container.querySelectorAll('pre').forEach(el => {
                    el.style.cssText = 'background: #2d2a26; color: #e8e6e1; padding: 16px; border-radius: 6px; overflow-x: auto; font-size: 10pt;';
                });
                container.querySelectorAll('pre code').forEach(el => {
                    el.style.cssText = 'background: none; padding: 0; color: inherit;';
                });
                container.querySelectorAll('blockquote').forEach(el => {
                    el.style.cssText = 'border-left: 4px solid #c45d35; padding-left: 16px; margin: 16px 0; font-style: italic; color: #666;';
                });
                container.querySelectorAll('a').forEach(el => {
                    el.style.cssText = 'color: #c45d35;';
                });
                container.querySelectorAll('table').forEach(el => {
                    el.style.cssText = 'border-collapse: collapse; width: 100%; margin: 16px 0;';
                });
                container.querySelectorAll('th, td').forEach(el => {
                    el.style.cssText = 'border: 1px solid #ddd; padding: 8px 12px; text-align: left;';
                });
                container.querySelectorAll('th').forEach(el => {
                    el.style.cssText += 'background: #f5f5f5; font-weight: bold;';
                });

                document.body.appendChild(container);

                const opt = {
                    margin: [15, 15, 15, 15],
                    filename: 'markdown-export.pdf',
                    image: { type: 'jpeg', quality: 0.98 },
                    html2canvas: { 
                        scale: 2,
                        useCORS: true,
                        letterRendering: true
                    },
                    jsPDF: { 
                        unit: 'mm', 
                        format: 'a4', 
                        orientation: 'portrait' 
                    },
                    pagebreak: { mode: 'avoid-all' }
                };

                await html2pdf().set(opt).from(container).save();
                
                document.body.removeChild(container);
                showToast('PDF exported successfully!');
            } catch (error) {
                console.error('PDF export error:', error);
                showToast('Error exporting PDF');
            } finally {
                exportBtn.disabled = false;
                exportBtn.innerHTML = '<span class="icon">📄</span><span>Export PDF</span>';
            }
        }

        // Event listeners
        editor.addEventListener('input', renderMarkdown);

        // File input
        fileInput.addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (file) handleFile(file);
            fileInput.value = ''; // Reset for same file selection
        });

        // Drag and drop
        const editorPanel = document.querySelector('.editor-panel');

        ['dragenter', 'dragover'].forEach(event => {
            editorPanel.addEventListener(event, (e) => {
                e.preventDefault();
                e.stopPropagation();
                dropZone.classList.add('active');
            });
        });

        ['dragleave', 'drop'].forEach(event => {
            editorPanel.addEventListener(event, (e) => {
                e.preventDefault();
                e.stopPropagation();
                dropZone.classList.remove('active');
            });
        });

        editorPanel.addEventListener('drop', (e) => {
            const files = e.dataTransfer.files;
            if (files.length > 0) {
                handleFile(files[0]);
            }
        });

        // Prevent default drag behavior on window
        ['dragenter', 'dragover', 'dragleave', 'drop'].forEach(event => {
            window.addEventListener(event, (e) => {
                e.preventDefault();
            });
        });

        // Initialize
        renderMarkdown();
    </script>
</body>
</html>
